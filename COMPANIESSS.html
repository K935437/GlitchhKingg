        /* --- KEEPING YOUR ORIGINAL BODY AND COLORS --- */
        body {

.social-media {

.social-media a {

}

/* Hover effects for a premium feel */
.social-media a:hover {

}

/* Specific color for Facebook on hover if you prefer brand colors */

  color: #1877F2; 
}

/* Specific color for TikTok on hover (Neon Pink/Cyan effect) */

  filter: drop-shadow(2px 0px 0px #ff0050) drop-shadow(-2px 0px 0px #00f2ea);
}
        /* --- THE NEW MIDDLE SECTION (MEDIA HUB) --- */
        :root {
            --bw-blue: #00ffff; /* Adjusted to match your cyan theme */
            --gradient: linear-gradient(135deg, #00ffff 0%, #0056b3 100%);
        }

        .main-container { padding: 40px 0; }

        /* Search Bar Area */
        .search-wrapper { position: relative; margin-bottom: 30px; z-index: 1500; }
        .search-area { 
            display: flex; background: rgba(255, 255, 255, 0.05); padding: 5px; 
            border-radius: 50px; border: 2px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .search-area:focus-within { border-color: #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        .search-area input { 
            flex: 1; padding: 18px 30px; border: none; font-size: 1.1rem; 
            outline: none; border-radius: 50px; background: transparent; color: white;
        }

        .suggestions-box {
            position: absolute; top: 115%; left: 0; right: 0;
            background: #1a1e26; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-height: 400px; overflow-y: auto; display: none; z-index: 9999;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .suggestion-item { 
            padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .suggestion-item:hover { background: rgba(0, 255, 255, 0.1); }

        /* Content Layout */
        .content-grid { display: grid; grid-template-columns: 420px 1fr; gap: 25px; height: 70vh; }
        .sidebar { 
            background: rgba(255, 255, 255, 0.03); border-radius: 25px; 
            overflow-y: auto; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #map { border-radius: 25px; z-index: 1; border: 1px solid rgba(0, 255, 255, 0.1); }

        /* Badges & Buttons */
        .badge { font-size: 0.65rem; text-transform: uppercase; padding: 6px 14px; border-radius: 50px; font-weight: 800; }
        .bg-radio { background: #332b00; color: #ffcc00; border: 1px solid #ffcc00; }
        .bg-media { background: #00331a; color: #00ff80; }
        .bg-corp { background: #002b33; color: #00ffff; }

        .btn-apply { 
            width: 100%; padding: 18px; background: var(--gradient); color: black; 
            border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem;
            transition: 0.3s;
        }
        .btn-apply:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4); }

        /* Modal Overlays */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; justify-content: center; 
            align-items: center; z-index: 3000; backdrop-filter: blur(10px);
        }
        .modal-box { 
            background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 550px; 
            color: #333; max-height: 85vh; overflow-y: auto;
        }

        @media (max-width: 1000px) { .content-grid { grid-template-columns: 1fr; height: auto; } #map { height: 400px; } }

<div class="modal-overlay" id="applyModal">
    <div class="modal-box" style="max-width: 650px;"> <h2 style="margin-top:0; color: #333; border-bottom: 2px solid #00ffff; padding-bottom: 10px;">Internship Application</h2>
        
        <form id="applyForm" onsubmit="handleFormSubmit(event)">
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="display:block; font-weight:700; margin-bottom: 5px;">Full Name</label>
                    <input type="text" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;" required>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-weight:700; margin-bottom: 5px;">Email Address</label>
                    <input type="email" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;" required>
                </div>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display:block; font-weight:700; margin-bottom: 5px;">Portfolio/LinkedIn Link</label>
                <input type="url" placeholder="https://..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 15px; background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px dashed #00ffff;">
                <label style="display:block; font-weight:700; margin-bottom: 5px;">Upload CV / Documents (PDF/Doc)</label>
                <input type="file" id="fileUpload" multiple style="width:100%; cursor: pointer;">
                <small style="color: #777;">You can select multiple files from your computer.</small>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display:block; font-weight:700; margin-bottom: 5px;">Compose Your Letter</label>

            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-apply" style="flex: 2;">Submit Application</button>
                <button type="button" onclick="closeApplyModal()" style="flex: 1; border: 1px solid #ccc; border-radius: 15px; background: white; color:#333; cursor:pointer; font-weight: bold;">Cancel</button>
            </div>
        </form>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([-24.6282, 25.9231], 13); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const companies = [
        { name: "Yarona FM", cat: "Radio", type: "bg-radio", lat: -24.6464, lng: 25.9231, site: "https://www.yaronafm.co.bw", desc: "Botswana's premier urban radio station." },
        { name: "Duma FM", cat: "Radio", type: "bg-radio", lat: -24.6350, lng: 25.9350, site: "https://www.dumafm.co.bw", desc: "A leading private talk and news radio station." },
        { name: "Gabz FM", cat: "Radio", type: "bg-radio", lat: -24.6580, lng: 25.9120, site: "https://www.gabzfm.com", desc: "The adult contemporary giant of Botswana." },
        { name: "RB2", cat: "Radio", type: "bg-radio", lat: -24.6590, lng: 25.9140, site: "#", desc: "Commercial state radio station." },
        { name: "Mmegi Newspaper", cat: "Media", type: "bg-media", lat: -24.6533, lng: 25.9067, site: "https://www.mmegi.bw", desc: "Independent press leader." },
        { name: "BTV", cat: "Media", type: "bg-media", lat: -24.6600, lng: 25.9200, site: "#", desc: "National television station." },
        { name: "Mascom Wireless", cat: "Telecom", type: "bg-corp", lat: -24.6333, lng: 25.9167, site: "#", desc: "Top telecom provider." }
    ];

    const searchInput = document.getElementById('searchInput');
    const suggestionsBox = document.getElementById('suggestions');
    const infoPanel = document.getElementById('infoPanel');
    let markerGroup = L.layerGroup().addTo(map);

    searchInput.addEventListener('input', function() {
        const val = this.value.toLowerCase();
        suggestionsBox.innerHTML = "";
        if (val.length < 1) { suggestionsBox.style.display = "none"; return; }

        const matches = companies.filter(c => 
            c.name.toLowerCase().includes(val) || 
            c.cat.toLowerCase().includes(val) ||
            (val === "radio" && c.cat === "Radio")
        );

        if (matches.length > 0) {
            suggestionsBox.style.display = "block";
            matches.forEach(m => {
                const d = document.createElement('div');
                d.className = 'suggestion-item';
                d.innerHTML = `<span><strong style="color:white">${m.name}</strong></span> <span class="badge ${m.type}">${m.cat}</span>`;
                d.onclick = () => showProfile(m);
                suggestionsBox.appendChild(d);
            });
        } else { suggestionsBox.style.display = "none"; }
    });

    function showProfile(company) {
        searchInput.value = company.name;
        suggestionsBox.style.display = "none";
        markerGroup.clearLayers();

        infoPanel.innerHTML = `
            <div>
                <span class="badge ${company.type}">${company.cat}</span>
                <h2 style="font-size: 1.8rem; margin: 15px 0 10px 0; color: #00ffff;">${company.name}</h2>
                <p style="color:#aaa; line-height:1.7;">${company.desc}</p>
                <a href="${company.site}" target="_blank" style="color:#00ffff; text-decoration:none; display:block; margin: 20px 0;">Official Website &rarr;</a>
                <button class="btn-apply" onclick="openApplyModal()">Apply Now</button>
            </div>
        `;

        L.marker([company.lat, company.lng]).addTo(markerGroup).bindPopup(`<b>${company.name}</b>`).openPopup();
        map.flyTo([company.lat, company.lng], 15);
    }

    function openApplyModal() { document.getElementById('applyModal').style.display = "flex"; }
    function closeApplyModal() { document.getElementById('applyModal').style.display = "none"; }
    function handleFormSubmit(e) {
        e.preventDefault();
        alert("Application Submitted!");
        closeApplyModal();
    }
</script>
